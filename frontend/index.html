<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBnB Analytics Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700;800&family=Rajdhani:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg: #08101c;
            --bg-deep: #060b16;
            --surface: rgba(14, 20, 34, 0.92);
            --surface-soft: rgba(22, 34, 56, 0.82);
            --surface-bright: rgba(255, 255, 255, 0.08);
            --text: #edf4ff;
            --muted: #89a2c2;
            --accent: #ffbf3b;
            --accent-secondary: #44d5ff;
            --accent-alt: #ff7960;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 35px 90px rgba(0, 0, 0, 0.32);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Rajdhani', sans-serif;
            color: var(--text);
            background:
                linear-gradient(180deg, #04101a 0%, #081724 48%, #0d1823 100%);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                mix-blend-mode: screen;
        }

        .hero-block {
            position: relative;
            overflow: hidden;
            padding: 5rem 0 4rem;
            background:
                linear-gradient(180deg, rgba(16, 26, 48, 0.96), rgba(11, 15, 28, 0.96));
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }


        .hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 1.5rem;
        }

        .hero-badge,
        .meta-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1rem;
            border-radius: 999px;
            font-size: 0.92rem;
            letter-spacing: 0.06em;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        .hero-title {
            margin: 0.25rem 0 0.75rem;
            font-size: clamp(2.8rem, 4.5vw, 4.8rem);
            line-height: 0.98;
            letter-spacing: -0.04em;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            max-width: 18ch;
            animation: glowText 4.8s ease-in-out infinite;
        }

        .hero-copy {
            max-width: 42rem;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 1.75rem;
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }


        .glass-panel {
            background: var(--surface);
            border: 1px solid var(--surface-bright);
            box-shadow: var(--shadow);
            border-radius: 24px;
            backdrop-filter: blur(22px);
            padding: 1.75rem;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.14);
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.28);
        }

        .glass-card {
            background: rgba(12, 18, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow);
            border-radius: 26px;
            padding: 1.75rem;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .glass-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 35px 110px rgba(0, 0, 0, 0.35);
        }

        .tab-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
            gap: 0.85rem;
        }

        .tab-button {
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem 1.25rem;
            border-radius: 999px;
            font-weight: 600;
            transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            text-align: center;
        }

        .tab-button:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
        }

        .tab-button.active {
            background: linear-gradient(135deg, var(--accent), #ff9d3d);
            color: var(--bg-deep);
            box-shadow: 0 24px 55px rgba(255, 191, 59, 0.22);
        }

        .app-shell {
            min-height: 100vh;
            background: transparent;
        }

        .btn-solid {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            font-weight: 700;
            letter-spacing: 0.02em;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            min-width: 9rem;
            padding: 0.95rem 1.4rem;
            background: linear-gradient(135deg, var(--accent), #ff9d3d);
            color: var(--bg-deep);
            box-shadow: 0 20px 48px rgba(255, 191, 59, 0.18);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #ffd669, #ff9900);
        }

        .btn-secondary {
            min-width: 9rem;
            padding: 0.95rem 1.4rem;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .field-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 0.95rem 1rem;
            border-radius: 18px;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .field-box:focus {
            outline: none;
            border-color: rgba(68, 213, 255, 0.8);
            box-shadow: 0 0 0 4px rgba(68, 213, 255, 0.08);
            background: rgba(255, 255, 255, 0.06);
        }

        .label-fine {
            display: block;
            margin-bottom: 0.65rem;
            font-size: 0.94rem;
            color: var(--muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .status-pill {
            display: inline-flex;
            gap: 0.4rem;
            align-items: center;
            border-radius: 999px;
            padding: 0.55rem 0.9rem;
            font-size: 0.95rem;
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .reveal {
            opacity: 0;
            transform: translateY(24px);
            animation: revealUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .hero-ribbon {
            display: inline-flex;
            align-items: center;
            padding: 0.9rem 1.2rem;
            margin-bottom: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 0.92rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            backdrop-filter: blur(18px);
            white-space: nowrap;
        }

        .hero-ribbon span {
            color: var(--accent);
            font-weight: 700;
        }

        .loader {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.12);
            border-top-color: var(--accent-secondary);
            animation: spin 0.95s linear infinite;
        }

        @keyframes revealUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes floatHero {

            0%,
            100% {
                transform: translateY(0) rotate(12deg);
            }

            50% {
                transform: translateY(-14px) rotate(12deg);
            }
        }

        @keyframes glowText {

            0%,
            100% {
                text-shadow: 0 0 24px rgba(255, 191, 59, 0.18), 0 0 40px rgba(68, 213, 255, 0.1);
            }

            50% {
                text-shadow: 0 0 28px rgba(255, 191, 59, 0.28), 0 0 48px rgba(68, 213, 255, 0.14);
            }
        }

        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(12, minmax(0, 1fr));
            gap: 1rem;
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.07;
        }

        .wallpaper-grid span {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0));
            border-radius: 999px;
        }

        .footer-note {
            color: var(--muted);
            letter-spacing: 0.06em;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel" src="app.js"></script>
</body>

</html>
